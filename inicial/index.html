<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <h1>CALCULADORA</h1>
    <main>
        <div>
            <h2>SOMA</h2>
            <label for="numero 1">Digite um número</label>
            <input type="number" id="numero1">
            <label for="numero 2">Digite um número</label>
            <input type="number" id="numero2">
            <button onclick="somar()">CALCULAR</button>
            <p id="respSoma"></p>
        </div>
        <div>
            <h2>SUBTRAÇÃO</h2>
            <label for="numero 3">Digite um número</label>
            <input type="number" id="numero3">
            <label for="numero 4">Digite um número</label>
            <input type="number" id="numero4">
            <button onclick="sub()">CALCULAR</button>
            <p id="respSub"></p>
        </div>
        <div>
            <h2>MULTIPLICAÇÃO</h2>
            <label for="numero 5">Digite um número</label>
            <input type="number" id="numero5">
            <label for="numero 6">Digite um número</label>
            <input type="number" id="numero6">
            <button onclick="mult()">CALCULAR</button>
            <p id="respMult"></p>
        </div>
        <div>
            <h2>DIVISÃO</h2>
            <label for="numero 7">Digite um número</label>
            <input type="number" id="numero7">
            <label for="numero 8">Digite um número</label>
            <input type="number" id="numero8">
            <button onclick="div()">CALCULAR</button>
            <p id="respDiv"></p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
